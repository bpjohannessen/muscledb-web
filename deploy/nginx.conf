# Reverse proxy for muscledb-web.
# Place in /etc/nginx/sites-available/muscledb-web and symlink into sites-enabled.
# The Node app listens on 127.0.0.1:5000 (see the systemd unit); nginx terminates
# public traffic (and TLS, once you add a certificate e.g. via certbot).

server {
    listen 80;
    server_name muscledb.example.com;   # <-- change to your domain or _

    # Optional: serve images/css/js straight from disk for slightly less overhead.
    # location /images/ { root /opt/muscledb-web/public; expires 7d; }

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
